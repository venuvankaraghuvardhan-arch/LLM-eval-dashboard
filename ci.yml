name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Set environment variables
        run: |
          echo "MOCK_MODE=true" >> $GITHUB_ENV
          echo "DATABASE_URL=sqlite+aiosqlite:///./test_eval.db" >> $GITHUB_ENV

      - name: Run evaluator unit tests
        run: pytest tests/test_evaluators.py -v

      - name: Run API integration tests
        run: pytest tests/test_api.py -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff linter
        run: ruff check backend/ --ignore E501 || true

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t llm-eval-dashboard:test .
      - name: Verify image builds
        run: docker images llm-eval-dashboard:test
